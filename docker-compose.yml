name: devtrack

services:
  mysql:
    image: mysql:8.0.36
    container_name: devtrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-devtrack}
      MYSQL_USER: ${DB_USER:-devtrack}
      MYSQL_PASSWORD: ${DB_PASSWORD:-StrongAppPass123!}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - devtrack-net

  api:
    build:
      context: .
      dockerfile: src/DevTrack.Api/Dockerfile
    container_name: devtrack-api
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-devtrack}
      DB_USER: ${DB_USER:-devtrack}
      DB_PASSWORD: ${DB_PASSWORD:-StrongAppPass123!}
      DB_SERVER_VERSION: ${DB_SERVER_VERSION:-8.0.36-mysql}
      JWT_SECRET: ${JWT_SECRET:-replace-with-strong-secret-at-least-32-chars}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    expose:
      - "8080"
    networks:
      - devtrack-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: devtrack-frontend
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"
    networks:
      - devtrack-net

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: devtrack-proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/devtrack-reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - devtrack-net

networks:
  devtrack-net:
    driver: bridge

volumes:
  mysql-data:
