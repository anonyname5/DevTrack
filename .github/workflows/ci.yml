name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore DevTrack.sln

      - name: Build solution
        run: dotnet build DevTrack.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test DevTrack.sln --configuration Release --no-build --verbosity normal
