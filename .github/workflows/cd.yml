name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: devtrack-api
  REGISTRY: ghcr.io

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        run: |
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -f src/DevTrack.Api/Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }} \
            -t ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.sha_tag }} \
            .

      - name: Login to GHCR (optional)
        if: ${{ secrets.GHCR_PAT != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Push image to GHCR (optional)
        if: ${{ secrets.GHCR_PAT != '' }}
        run: docker push ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.sha_tag }}

      - name: Skip push notice
        if: ${{ secrets.GHCR_PAT == '' }}
        run: echo "GHCR_PAT is not set. Image was built for validation but not pushed."

      - name: Deploy step placeholder
        run: |
          echo "Next step: add SSH deploy to your VPS."
          echo "Typical flow: pull image -> stop old container -> run new container -> health check."
