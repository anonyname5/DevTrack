name: Frontend CD

on:
  push:
    branches:
      - Dev
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Upload frontend dist to VPS temp path
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          source: "frontend/dist/*"
          target: "/tmp/devtrack-frontend-dist"
          strip_components: 2

      - name: Publish frontend and reload Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            WEB_ROOT="${{ secrets.FRONTEND_WEB_ROOT != '' && secrets.FRONTEND_WEB_ROOT || '/var/www/devtrack-frontend' }}"
            mkdir -p "$WEB_ROOT"
            rm -rf "$WEB_ROOT"/*
            cp -r /tmp/devtrack-frontend-dist/* "$WEB_ROOT"/
            chown -R www-data:www-data "$WEB_ROOT" || true
            find "$WEB_ROOT" -type d -exec chmod 755 {} \;
            find "$WEB_ROOT" -type f -exec chmod 644 {} \;
            nginx -t
            systemctl reload nginx
